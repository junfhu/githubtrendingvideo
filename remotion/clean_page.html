<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #0d1117; }
  iframe {
    width: 1920px; height: 3000px;
    border: none;
    /* Position to hide GitHub header (top ~60px) and show content below */
    position: absolute;
    top: -62px; left: 0;
    clip: rect(62px, 1920px, 1142px, 0);
  }
</style>
</head>
<body>
  <iframe src="https://github.com/mattpocock/skills"></iframe>
</body>
</html>
